<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prototype Funnel Canvas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body {
        margin: 0;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div style="min-height:100vh;display:grid;place-items:center;background:#f7f8fb;color:#0f172a">
        Chargement du prototype...
      </div>
    </div>

    <script>
      async function bootPrototype() {
        const response = await fetch("./FunnelCanvasPrototype.jsx");
        let source = await response.text();

        source = source
          .replace('import React, { useMemo, useRef, useState } from "react";', "const { useMemo, useRef, useState } = React;")
          .replace("export default function FunnelCanvasPrototype", "function FunnelCanvasPrototype");

        source += `
          ReactDOM.createRoot(document.getElementById("root")).render(
            React.createElement(FunnelCanvasPrototype)
          );
        `;

        const transformed = Babel.transform(source, {
          presets: ["react"],
          filename: "FunnelCanvasPrototype.jsx",
        }).code;

        new Function("React", "ReactDOM", transformed)(React, ReactDOM);
      }

      bootPrototype().catch((error) => {
        document.getElementById("root").innerHTML =
          '<div style="padding:32px;font-family:system-ui;color:#991b1b">Impossible de charger le prototype. Lancez-le via un serveur local, pas en file://.<br><pre style="white-space:pre-wrap">' +
          error.message +
          "</pre></div>";
        console.error(error);
      });
    </script>
  </body>
</html>
